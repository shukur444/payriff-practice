name: Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Repo kodunu al
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2) Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3) ECR login (region ENV ilə verilir)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}

      # 4) Image build + tag + push
      - name: Build and push Docker image
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO }}

          echo "Building image: $REPO_URI:$IMAGE_TAG"

          docker build -t $REPO_URI:$IMAGE_TAG ./app
          docker push $REPO_URI:$IMAGE_TAG

      - name: Done
        run: echo "Image pushed successfully"

