name: Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Repo kodunu runner-a çəkir
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2) Docker builder (modern build engine)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3) AWS ECR login (AWS CLI YOX, yalnız action)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        with:
          region: ${{ secrets.AWS_REGION }}

      # 4) Docker image build + tag + push
      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}   # hər commit üçün unikal tag
        run: |
          REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO }}

          echo "Building image: $REPO_URI:$IMAGE_TAG"

          docker build -t $REPO_URI:$IMAGE_TAG ./app
          docker push $REPO_URI:$IMAGE_TAG

      # 5) (opsiyonel) build tamamlandı mesajı
      - name: Done
        run: echo "Image pushed to ECR successfully"

