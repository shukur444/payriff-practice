name: Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Repo kodunu al
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2) AWS credentials runner-a tanıt
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3) Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4) ECR login
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 5) Image build + tag + push
      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO }}

          echo "Building image: $REPO_URI:$IMAGE_TAG"

          docker build -t $REPO_URI:$IMAGE_TAG ./app
          docker push $REPO_URI:$IMAGE_TAG

      - name: Done
        run: echo "Image pushed successfully"

